name: Deploy to Namecheap via FTP

on:
  push:
    branches:
      - main # Make sure your branch is named main (or master)

jobs:
  web-deploy:
    name: 🎉 Deploy
    runs-on: ubuntu-latest
    steps:
      - name: 🚚 Get latest code
        uses: actions/checkout@v4
      
      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: 📦 Install dependencies
        run: npm ci

      - name: 🏗️ Build Next.js App
        run: npm run build

      - name: 📂 Prepare Standalone Directory
        run: |
          # Next.js standalone doesn't copy public or static folders by default, so we do it manually
          cp -r .next/static .next/standalone/.next/
          cp -r public .next/standalone/
          
          # Replace the default server with our custom Namecheap-compatible server
          cp final_server.js .next/standalone/server.js
      
      - name: 🚀 Sync files via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: .next/standalone/
          server-dir: ./
          # Exclude production logs and env files so they aren't overwritten
          exclude: |
            **/.git*
            **/.git*/**
            .env*
            error.log
            passenger.log
