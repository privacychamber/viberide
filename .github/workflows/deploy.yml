name: Deploy to Namecheap via FTP

on:
  push:
    branches:
      - main # Make sure your branch is named main (or master)

jobs:
  web-deploy:
    name: 🎉 Deploy
    runs-on: ubuntu-latest
    steps:
      - name: 🚚 Get latest code
        uses: actions/checkout@v4
      
      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: 📦 Install dependencies
        run: npm ci

      - name: 🏗️ Build Next.js App
        run: npm run build
        env:
          MONGODB_URI: ${{ secrets.MONGODB_URI }}

      - name: 📂 Prepare Standalone Directory
        run: |
          # Next.js standalone doesn't copy public or static folders by default, so we do it manually
          cp -r .next/static .next/standalone/.next/
          cp -r public .next/standalone/
          
          # Replace the default server with our custom Namecheap-compatible server
          # We name it next_server.js because the wrapper will be server.js
          cp final_server.js .next/standalone/next_server.js
          
          # Zip the contents of the standalone directory to avoid FTP timeouts on thousands of files
          cd .next/standalone
          zip -r ../../deploy.zip ./*
          cd ../../
          
          # Create a clean folder just for the zip upload
          mkdir deploy_upload
          mv deploy.zip deploy_upload/
          
          # Create an auto-extracting server script
          cat << 'EOF' > deploy_upload/server.js
          const fs = require('fs');
          const path = require('path');
          const { execSync } = require('child_process');
          
          const zipPath = path.join(__dirname, 'deploy.zip');
          
          if (fs.existsSync(zipPath)) {
            console.log('Found deploy.zip, extracting...');
            try {
              execSync('unzip -o deploy.zip', { stdio: 'inherit' });
              fs.unlinkSync(zipPath);
              console.log('Extraction complete.');
            } catch (err) {
              console.error('Error extracting:', err);
            }
          }
          
          // Require the actual Next.js server
          require('./next_server.js');
          EOF
          
          # Create a restart.txt to tell Passenger to automatically restart the Node.js app
          mkdir -p deploy_upload/tmp
          date > deploy_upload/tmp/restart.txt
      
      - name: 🚀 Sync files via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: deploy_upload/
          server-dir: viberide.in/
          # Exclude production logs and env files so they aren't overwritten
          exclude: |
            **/.git*
            **/.git*/**
            .env*
            error.log
            passenger.log
